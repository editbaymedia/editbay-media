<!DOCTYPE html>
<html lang="en" class="en-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditBay | Premium AI Video Production Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        :root {
            --accent: #3b82f6; 
            --bg-dark: #050a14;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* 언어 제어 로직 */
        .en-content, .ko-content { display: none !important; }
        .en-mode .en-content { display: block !important; }
        .en-mode span.en-content, .en-mode a.en-content { display: inline-block !important; }
        .ko-mode .ko-content { display: block !important; }
        .ko-mode span.ko-content, .ko-mode a.ko-content { display: inline-block !important; }

        .glass-nav {
            background: rgba(5, 10, 20, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-card {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .video-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(59, 130, 246, 0.3);
        }

        .lang-btn {
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .lang-btn.active {
            opacity: 1;
            color: var(--accent);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#home" class="flex items-center">
                <img src="logo.png" alt="EditBay Logo" class="h-10 w-auto hover:opacity-80 transition">
            </a>
            
            <div class="flex items-center gap-8">
                <div class="hidden md:flex space-x-10 text-sm font-bold tracking-widest">
                    <a href="#services" class="en-content hover:text-blue-400 transition">SERVICES</a>
                    <a href="#portfolio" class="en-content hover:text-blue-400 transition">PORTFOLIO</a>
                    <a href="#contact" class="en-content hover:text-blue-400 transition">CONTACT</a>
                    
                    <a href="#services" class="ko-content hover:text-blue-400 transition">서비스</a>
                    <a href="#portfolio" class="ko-content hover:text-blue-400 transition">포트폴리오</a>
                    <a href="#contact" class="ko-content hover:text-blue-400 transition">문의하기</a>
                </div>
                
                <div class="flex items-center gap-2 px-3 py-1 rounded-full border border-white/10 bg-white/5">
                    <button onclick="changeLang('en')" id="btn-en" class="lang-btn active">EN</button>
                    <span class="text-white/10 text-[10px]">|</span>
                    <button onclick="changeLang('ko')" id="btn-ko" class="lang-btn">KR</button>
                </div>
            </div>
        </div>
    </nav>

    <section id="home" class="relative min-h-screen flex items-center pt-20">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
            <div class="space-y-8">
                <div class="en-content space-y-6">
                    <h1 class="text-6xl md:text-8xl font-bold leading-[1.1] tracking-tight text-white">Unrivaled Ads <br><span class="text-blue-500">Built by AI</span></h1>
                    <p class="text-slate-400 text-lg md:text-xl max-w-lg leading-relaxed font-light">Elevate your brand with high-end AI storytelling. No filming required.</p>
                </div>
                <div class="ko-content space-y-6">
                    <h1 class="text-6xl md:text-8xl font-bold leading-[1.1] tracking-tight text-white">AI로 완성하는<br><span class="text-blue-500">독보적인 광고</span></h1>
                    <p class="text-slate-400 text-lg md:text-xl max-w-lg leading-relaxed font-light">촬영 없이 AI 스토리텔링만으로 귀하의 브랜드를 시네마틱하게 표현합니다.</p>
                </div>
                <div class="pt-4">
                    <a href="#contact" class="px-10 py-5 bg-blue-600 rounded-2xl font-bold text-lg hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/30 text-white">
                        <span class="en-content">Start Project</span>
                        <span class="ko-content">문의 시작하기</span>
                    </a>
                </div>
            </div>

            <div class="video-card aspect-video shadow-2xl">
                <iframe class="w-full h-full" 
                    src="https://www.youtube.com/embed/-yapoXm91tw?autoplay=1&mute=1&loop=1&playlist=-yapoXm91tw&controls=0" 
                    frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
        </div>
    </section>

    <section id="services" class="py-32 bg-slate-950/50">
        </section>

    <section id="portfolio" class="py-32 border-t border-white/5">
        </section>

    <section id="contact" class="py-32">
        </section>

    <footer class="py-12 text-center text-slate-700 text-[10px] tracking-widest uppercase">
        <p>© 2026 EDITBAY MEDIA. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        function changeLang(lang) {
            const html = document.documentElement;
            const btnEn = document.getElementById('btn-en');
            const btnKo = document.getElementById('btn-ko');
            const nameInput = document.getElementById('nameInput');
            const msgInput = document.getElementById('msgInput');

            if(lang === 'ko') {
                html.className = 'ko-mode';
                btnKo.classList.add('active');
                btnEn.classList.remove('active');
                nameInput.placeholder = "성함 또는 업체명";
                msgInput.placeholder = "프로젝트에 대해 알려주세요...";
            } else {
                html.className = 'en-mode';
                btnEn.classList.add('active');
                btnKo.classList.remove('active');
                nameInput.placeholder = "Name / Business";
                msgInput.placeholder = "Project details...";
            }
        }
    </script>
</body>
</html>
